<html lang="en">

<title>CyberSec Research Index 2025–26</title>
<style>

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --accent3: #7b61ff;
    --accent4: #00cfff;
    --text: #e0e0f0;
    --muted: #6b6b8a;
    --tag-bg: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.97);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .venue-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .filter-btn.venue-sp.active { background: var(--accent2); border-color: var(--accent2); }
  .filter-btn.venue-ccs.active { background: var(--accent3); border-color: var(--accent3); }
  .filter-btn.venue-ndss.active { background: var(--accent4); border-color: var(--accent4); }

  .stats {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 14px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .main {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 120px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 120px;
    height: calc(100vh - 120px);
    overflow-y: auto;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  .sidebar-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    padding: 0 20px 12px;
    text-transform: uppercase;
  }

  .topic-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 20px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }
  .topic-btn:hover { color: var(--text); background: var(--surface); }
  .topic-btn.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface); }

  .topic-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: var(--tag-bg);
    padding: 2px 6px;
    border-radius: 2px;
  }

  .content {
    padding: 24px 32px;
    overflow-y: auto;
  }

  .topic-section {
    margin-bottom: 40px;
  }

  .topic-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .topic-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .topic-pill {
    font-size: 10px;
    padding: 2px 8px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  .papers-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .paper-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: start;
    padding: 10px 14px;
    border: 1px solid transparent;
    transition: all 0.15s;
    background: var(--surface);
  }
  .paper-row:hover { border-color: var(--border); }
  .paper-row.hidden { display: none; }

  .venue-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 3px 6px;
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .venue-usenix { background: rgba(0,255,136,0.1); color: var(--accent); border: 1px solid rgba(0,255,136,0.3); }
  .venue-sp { background: rgba(255,107,53,0.1); color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); }
  .venue-ccs { background: rgba(123,97,255,0.1); color: var(--accent3); border: 1px solid rgba(123,97,255,0.3); }
  .venue-ndss { background: rgba(0,207,255,0.1); color: var(--accent4); border: 1px solid rgba(0,207,255,0.3); }

  .paper-title {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  .paper-title a {
    color: inherit;
    text-decoration: none;
    transition: color 0.15s;
  }
  .paper-title a:hover { color: var(--accent); }

  .paper-award {
    font-size: 10px;
    color: #ffd700;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    margin-top: 2px;
  }

  .no-results {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    display: none;
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

    width: 8px; height: 8px; border-radius: 50%;
  }

// Deduplicate
const seen = new Set();
const uniquePapers = papers.filter(p => {
  if(seen.has(p.t)) return false;
  seen.add(p.t);
  return true;
});

// Build topic list
const topicMap = {};
uniquePapers.forEach(p => {
  if(!topicMap[p.topic]) topicMap[p.topic] = [];
  topicMap[p.topic].push(p);
});
const topics = Object.keys(topicMap).sort();

let activeVenue = 'all';
let activeTopic = null;

function getVenueUrl(v) { return VENUE_URLS[v] || '#'; }
function venueLabel(v) {
  return {usenix:'USENIX',sp:'S&P',ccs:'CCS',ndss:'NDSS'}[v] || v.toUpperCase();
}

function buildNav() {
  const nav = document.getElementById('topic-nav');
  nav.innerHTML = '';
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.dataset.topic = t;
    const count = topicMap[t].length;
    btn.innerHTML = `<span>${t}</span><span class="topic-count">${count}</span>`;
    btn.onclick = () => {
      document.getElementById('content').querySelector(`[data-topic="${CSS.escape(t)}"]`)?.scrollIntoView({behavior:'smooth', block:'start'});
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    nav.appendChild(btn);
  });
}

function buildContent() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  topics.forEach(topic => {
    const section = document.createElement('div');
    section.className = 'topic-section';
    section.dataset.topic = topic;
    const papers = topicMap[topic];
    section.innerHTML = `
      <div class="topic-header">
        <span class="topic-name">${topic}</span>
        <span class="topic-pill venue-tag venue-usenix">${papers.length} papers</span>
      </div>
      <div class="papers-grid" id="grid-${topic.replace(/[^a-z0-9]/gi,'_')}">
        ${papers.map(p => `
          <div class="paper-row" data-venue="${p.v}" data-title="${p.t.toLowerCase()}">
            <span class="venue-tag venue-${p.v}">${venueLabel(p.v)}</span>
            <span class="paper-title"><a href="${getVenueUrl(p.v)}" target="_blank" rel="noopener">${p.t}</a></span>
            ${p.award ? `<span class="paper-award">★ ${p.award}</span>` : '<span></span>'}
          </div>
        `).join('')}
      </div>
    `;
    content.appendChild(section);
  });
}

function updateStats() {
  const rows = document.querySelectorAll('.paper-row:not(.hidden)');
  document.getElementById('stats').textContent = `${rows.length} papers`;
}

function filterAll() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let total = 0;
  document.querySelectorAll('.paper-row').forEach(row => {
    const venueMatch = activeVenue === 'all' || row.dataset.venue === activeVenue;
    const textMatch = !q || row.dataset.title.includes(q);
    const show = venueMatch && textMatch;
    row.classList.toggle('hidden', !show);
    if(show) total++;
  });
  // Hide empty sections
  document.querySelectorAll('.topic-section').forEach(sec => {
    const visible = sec.querySelectorAll('.paper-row:not(.hidden)').length;
    sec.style.display = visible ? '' : 'none';
  });
  document.getElementById('stats').textContent = `${total} papers`;
}

function toggleVenue(v, btn) {
  activeVenue = v;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAll();
}

buildNav();
buildContent();
updateStats();
filterAll();
</script>
